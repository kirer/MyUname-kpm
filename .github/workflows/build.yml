name: Build

on:
  push:
    branches: [main]
    paths:
      - 'src/MyUname.c'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to attach artifact to (leave empty for just upload)'
        required: false
        type: string

env:
  TOOLCHAIN_VERSION: 12.2.rel1
  TOOLCHAIN_URL: https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf.tar.xz
  TOOLCHAIN_DIR: toolchain

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MyUname-kpm
        uses: actions/checkout@v5

      - name: Restore cached toolchain + KernelPatch
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            toolchain
            KernelPatch
          key: kpdeps-v3-${{ env.TOOLCHAIN_VERSION }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            kpdeps-v3-${{ env.TOOLCHAIN_VERSION }}-

      - name: Download ARM64 bare-metal toolchain
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "Downloading ARM GNU Toolchain ${{ env.TOOLCHAIN_VERSION }}..."
          curl -fsSL "${{ env.TOOLCHAIN_URL }}" -o /tmp/toolchain.tar.xz
          mkdir -p "${{ env.TOOLCHAIN_DIR }}"
          tar -xJf /tmp/toolchain.tar.xz -C "${{ env.TOOLCHAIN_DIR }}" --strip-components=1
          rm /tmp/toolchain.tar.xz
          echo "Toolchain installed at $(pwd)/${{ env.TOOLCHAIN_DIR }}"

      - name: Checkout KernelPatch (headers only)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/checkout@v5
        with:
          repository: bmax121/KernelPatch
          path: KernelPatch
          sparse-checkout: |
            kernel/include/
            kernel/patch/include/
            kernel/linux/include/
            kernel/linux/arch/arm64/include/
            kernel/linux/tools/arch/arm64/include/

      - name: Build
        env:
          TARGET_COMPILE: ${{ github.workspace }}/${{ env.TOOLCHAIN_DIR }}/bin/aarch64-none-elf-
          KP_DIR: ${{ github.workspace }}/KernelPatch
        run: |
          make clean
          make -j$(nproc)

      - name: List build artifacts
        run: ls -lh MyUname.kpm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyUname-kpm-${{ github.sha }}
          path: MyUname.kpm
          retention-days: 30

  release:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: MyUname-kpm-${{ github.sha }}
          path: release-artifact

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" release-artifact/MyUname.kpm \
            --clobber \
            --repo "${{ github.repository }}"
